
{% extends 'template.html' %}
{% block titulo %}Editar Categoria{% endblock %}
{% block conteudo %}
<div class="container">
    <div class="form-card">
        <h2>Editar Categoria</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}:</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="form-btn">Atualizar</button>
        </form>
    </div>
</div>
{% endblock %}
