{% extends 'template.html' %}
{% block titulo %}Categorias{% endblock %}
{% block conteudo %}
<div class="container">
    <h2 class="page-title">Categorias</h2>
    <div class="table-wrapper">
        <div class="table-header">
            <a href="{% url 'addcategoria' %}" class="btn btn-green">+ Nova Categoria</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for cat in categorias %}
                <tr>
                    <td>{{ cat.id }}</td>
                    <td>{{ cat.nome }}</td>
                    <td class="acoes">
                        <a href="{% url 'editcategoria' cat.id %}" class="btn btn-green">Editar</a>
                        <a href="{% url 'delcategoria' cat.id %}" class="btn btn-red">Excluir</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" style="text-align:center;color:#888;">Nenhuma categoria cadastrada.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
