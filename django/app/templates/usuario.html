{% extends 'template.html' %}
{% block titulo %}Django Usuários{% endblock %}
{% block conteudo %}
<div class="container">
    <h2 class="page-title">Usuários</h2>
    <div class="table-wrapper">
        <div class="table-header">
            <a href="{% url 'criarusuario' %}" class="btn btn-green">+ Novo Usuário</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for u in usuarios %}
                <tr>
                    <td>{{ u.id }}</td>
                    <td>{{ u.username }}</td>
                    <td>{{ u.email }}</td>
                    <td class="acoes">
                        <a href="{% url 'editusuario' u.id %}" class="btn btn-green">Editar</a>
                        <a href="{% url 'delusuario' u.id %}" class="btn btn-red">Excluir</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" style="text-align:center;color:#888;">Nenhum usuário cadastrado.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
