{% extends 'template.html' %}
{% block titulo %}Confirmar Exclusão{% endblock %}
{% block conteudo %}
<div class="container">
    <div class="confirm-card">
        <p>Tem certeza que deseja excluir <strong>{{ usuario.username }}</strong>?</p>
        <div class="confirm-btns">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-red">Sim, excluir</button>
            </form>
            <a href="{% url 'usuario' %}" class="btn btn-outline">Cancelar</a>
        </div>
    </div>
</div>
{% endblock %}
