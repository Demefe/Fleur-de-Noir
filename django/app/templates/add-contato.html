{% extends 'template.html' %}
{% block titulo %}Add Contato{% endblock %}
{% block conteudo %}
<div class="container">
    <div class="form-card">
        <h2>Fale Conosco</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}:</label>
                {{ field }}
                {% for error in field.errors %}
                    <span style="color:red;font-size:0.83rem;">{{ error }}</span>
                {% endfor %}
            </div>
            {% endfor %}
            <button type="submit" class="form-btn">Enviar</button>
        </form>
    </div>
</div>
{% endblock %}
